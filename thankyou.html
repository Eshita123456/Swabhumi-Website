<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

/* CONTAINER */
.thankyou-section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* BOX */
.thankyou-box {
  background: #fff;
  padding: 40px;
  text-align: center;
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  max-width: 400px;
}

/* ICON */
.check-icon {
  font-size: 50px;
  color: #28a745;
  margin-bottom: 15px;
}

/* TEXT */
.thankyou-box h1 {
  font-size: 26px;
  margin-bottom: 10px;
}

.thankyou-box p {
  font-size: 14px;
  color: #555;
  margin-bottom: 20px;
}

/* BUTTON */
.home-btn {
  display: inline-block;
  padding: 10px 25px;
  background: #caa75e;
  color: #fff;
  text-decoration: none;
  border-radius: 4px;
  transition: 0.3s;
}

.home-btn:hover {
  background: #000;
}

/* ANIMATION */
.thankyou-box {
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>

</head>
<body>

<section class="thankyou-section">

  <div class="thankyou-box">

    <div class="check-icon">✔</div>

    <h1>Thank You!</h1>

    <p>Your enquiry has been submitted successfully.<br>
       Our team will contact you shortly.</p>

    <a href="index.html" class="home-btn">Back to Home</a>

  </div>

</section>

</body>
</html>
